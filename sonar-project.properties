# SonarCloud project config. Free for public repos.
#
# One-time setup (no code change needed afterwards):
#   1. Sign in at https://sonarcloud.io with the clawmint-ai GitHub org.
#   2. Import the agent-task-market repo; set Quality Gate to "Sonar way".
#   3. Add repo secret SONAR_TOKEN, then set repo variable ENABLE_SONAR=true.
# Until ENABLE_SONAR is "true" the workflow is skipped, so this file is inert.

sonar.organization=clawmint-ai
sonar.projectKey=clawmint-ai_agent-task-market
sonar.projectName=Agent Task Market

# Analyse the two TS packages; leave generated/vendored trees out.
sonar.sources=backend/src,mcp-server/src
sonar.tests=backend/test
sonar.test.inclusions=backend/test/**/*

sonar.exclusions=**/node_modules/**,**/dist/**,**/*.sql,**/public/**

# Coverage: backend emits lcov via `npm run test:coverage` (c8 over unit +
# integration). Report paths are relative to backend/, so prefix here.
sonar.javascript.lcov.reportPaths=backend/coverage/lcov.info

# Tell Sonar which TS configs to resolve types against.
sonar.typescript.tsconfigPaths=backend/tsconfig.json,mcp-server/tsconfig.json

sonar.sourceEncoding=UTF-8
