name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  backend:
    name: backend (typecheck + tests)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        # Wait until Postgres is ready before the steps run.
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Unit tests
        run: npm run test:unit
      - name: Integration tests
        run: npm run test:integration
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/postgres
      # Round-trip the migrator against a clean DB: build from zero → roll the
      # last migration back → re-apply. Proves every migration has a working
      # `down` and that `up` is repeatable. Runs in the `public` schema (the
      # integration tests use throwaway schemas, so `public` is still empty).
      - name: Migration round-trip (up / down / up)
        run: |
          npm run migrate
          npm run migrate:down
          npm run migrate
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/postgres

  mcp-server:
    name: mcp-server (typecheck + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mcp-server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mcp-server/package-lock.json
      - run: npm ci
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Build
        run: npm run build

  docker:
    name: docker compose (config + build)
    runs-on: ubuntu-latest
    # Guards the one-command demo (`docker compose up --build`): a broken
    # Dockerfile, a missing build context, or a renamed stage target would
    # otherwise only surface when a user tries to run the stack. ubuntu-latest
    # ships Docker + Compose v2, so no extra setup is needed.
    steps:
      - uses: actions/checkout@v4
      # Fail fast with a clear message if the compose file is malformed or refers
      # to a build target/context that can't be resolved.
      - name: Validate compose file
        run: docker compose config -q
      # Also validate the fully-merged production + monitoring overlay set — the
      # same `-f` combination deploy.yml ships. `config -q` parses every overlay
      # and the alertmanager/prometheus service definitions, so a broken overlay
      # (e.g. a telegram_config field unsupported by the pinned alertmanager, or a
      # bad !reset/merge) fails the PR instead of crash-looping live. Only merges
      # YAML — it does not read volume contents, so the secrets dir need not hold
      # real files here.
      - name: Validate merged prod + monitoring overlays
        run: docker compose -f docker-compose.yml -f docker-compose.prod.yml -f docker-compose.monitoring.yml config -q
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      # Clean build of every buildable image (backend runtime, backend builder via
      # the seed service's `target: builder`, and mcp-server). No layer cache on
      # purpose — a from-scratch build is the honest check and can't be masked by
      # stale cache. postgres has no `build:`, so it isn't pulled here.
      - name: Build all images
        run: docker compose build
