# Auto-deploy to the AWS EC2 box on push to main.
#
# CI (ci.yml) runs on the PR and gates the merge, so by the time main moves,
# typecheck + tests + docker build have already passed. This job then SSHes into
# the box and rolls the stack forward with the new code.
#
# Prerequisites (one-time), all stored as repo secrets — see docs/deploy.md
# "Auto-deploy from GitHub":
#   DEPLOY_HOST   — EC2 Elastic IP (allocate one; the auto-assigned public IP
#                   changes on stop/start and would break DNS + this secret)
#   DEPLOY_USER   — SSH user (ec2-user on Amazon Linux 2023)
#   DEPLOY_SSH_KEY — private key whose public half is on the box (the launch
#                    keypair, e.g. "clawmint")
#   DEPLOY_PATH   — checkout dir on the box (e.g. /home/ec2-user/agent-task-market)
name: Deploy

on:
  push:
    branches: [main]
  # Manual re-trigger (Actions tab → Run workflow) for when main hasn't moved but
  # you need to roll the box forward — e.g. a new risk-engine :latest was pushed
  # from the other repo and you want to pull it without an empty commit.
  workflow_dispatch:

# A newer push supersedes an in-flight deploy.
concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:
  deploy:
    name: deploy to EC2
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          # Pull the new code and roll the stack forward. --build rebuilds the
          # backend/mcp images; up -d recreates only changed services. Compose
          # restart policies + healthchecks bring services back if they crash.
          # ALL FOUR overlays are passed so the deployed set == the intended
          # running set: (1) omitting the monitoring overlay while keeping
          # --remove-orphans would delete the running Prometheus/Alertmanager/
          # Grafana on every deploy (they'd look like orphans), silently blinding
          # the conservation alert; (2) omitting the telegram overlay would run
          # alertmanager on the channel-agnostic no-op default, silently stopping
          # alert DELIVERY. The monitoring stack + Telegram delivery are permanent
          # on this box. (CLAWMIN-49)
          script: |
            set -euo pipefail
            cd ${{ secrets.DEPLOY_PATH }}
            git fetch --all
            git reset --hard origin/main
            # Build the untrusted-code sandbox image (Node + Python + pytest).
            # Layer-cached, so this is ~instant after the first build. The backend
            # references it via SANDBOX_IMAGE when SANDBOX_MODE=docker. Building it
            # unconditionally keeps it in sync with deploy/sandbox/Dockerfile even
            # when sandbox mode is off (harmless: it's just an unused image then).
            docker build -t clawmint-sandbox:latest deploy/sandbox
            # Roll the risk-engine forward. It's referenced by image: (not build:),
            # and compose's default pull policy is "missing" — so `up -d` will NOT
            # re-fetch an existing :latest tag. Pull it explicitly so a freshly
            # pushed engine image actually lands. Named service only: backend/mcp
            # are build: services and a bare `pull` would error under pipefail.
            # Requires `docker login ghcr.io` on the box (private image).
            docker compose -f docker-compose.yml -f docker-compose.prod.yml -f docker-compose.monitoring.yml -f docker-compose.monitoring.telegram.yml pull risk-engine
            docker compose -f docker-compose.yml -f docker-compose.prod.yml -f docker-compose.monitoring.yml -f docker-compose.monitoring.telegram.yml up -d --build --remove-orphans
            docker image prune -f
            # Reclaim Docker build cache too. On a small box (t3.micro) the build
            # cache — not images — is what fills the disk and fails `npm ci` with
            # ENOSPC on a later deploy. `image prune` alone doesn't touch it.
            docker builder prune -af
