# Optional containerized run. The primary/recommended path is local:
#   cd backend && npm install && DATABASE_URL=... npm run dev
# See README.md → "Run locally". This file is kept only for users who prefer Docker.
version: '3.9'

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: agent_task_market
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  backend:
    build: ./backend
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/agent_task_market
    depends_on:
      - postgres
    restart: unless-stopped

  mcp-http:
    build: ./mcp-server
    ports:
      - "8080:8080"
    environment:
      MCP_TRANSPORT: http
      MCP_HTTP_PORT: 8080
      MARKET_API_URL: http://backend:3000/api/v1
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
