# Fly.io deployment — MCP HTTP endpoint (remote agents like Hermes).
#
# Public entry (after `fly certs add`, see ../docs/deploy.md): https://mcp.<domain>
# Stateless: no DB. Talks to the backend over Fly's private network, so the
# market API never makes a public round-trip. Change the app name here (and in
# .github/workflows/deploy.yml) if it's already taken.
app = "clawmint-mcp"

# Same region as the backend so the internal API hop stays in-datacenter.
primary_region = "hkg"

[build]
  dockerfile = "Dockerfile"

[env]
  MCP_TRANSPORT = "http"
  MCP_HTTP_PORT = "8080"
  # Reach the backend over 6PN private networking (<app>.internal resolves to the
  # backend's private IPv6). Keep in sync with the backend app name above.
  MARKET_API_URL = "http://clawmint-market.internal:3000/api/v1"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  # /health is served by the MCP HTTP server (see src/index.ts). Same tight
  # cadence as the backend → unhealthy machine restarted within the 30s bar.
  [[http_service.checks]]
    method = "GET"
    path = "/health"
    interval = "10s"
    timeout = "2s"
    grace_period = "5s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
