# Alertmanager routing for the Agent Task Market.
#
# This is the CHANNEL-AGNOSTIC default: it boots without any external secrets and
# delivers nowhere (a no-op webhook). Wire your real destination by uncommenting
# the Slack/PagerDuty blocks below and providing secrets via file — do NOT commit
# real keys here.
#
# clawmint's own deployment delivers to Telegram via an OPTIONAL overlay
# (docker-compose.monitoring.telegram.yml + alertmanager.telegram.yml), so this
# generic file stays free of any one operator's channel choice. See docs/deploy.md.
#
# The critical route (severity=critical, e.g. ConservationBroken) is split out so
# it can page 24/7 with a tight repeat interval, while warnings batch.

global:
  resolve_timeout: 5m

route:
  receiver: default
  group_by: ['alertname']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    # Money-invariant breaks page immediately and re-page every 30m until resolved.
    - matchers:
        - severity = "critical"
      receiver: pager
      group_wait: 0s
      repeat_interval: 30m
      continue: false

receivers:
  - name: default
    # Replace with a real receiver. Left as a no-op webhook so the stack boots
    # without external secrets.
    webhook_configs:
      - url: http://127.0.0.1:5001/noop
        send_resolved: true

  - name: pager
    # ── PagerDuty (uncomment + set PD routing key via a secret file) ──
    # pagerduty_configs:
    #   - routing_key_file: /etc/alertmanager/secrets/pd_routing_key
    #     description: '{{ .CommonAnnotations.summary }}'
    #     severity: critical
    #
    # ── Slack (uncomment + set the webhook URL via a secret file) ──
    # slack_configs:
    #   - api_url_file: /etc/alertmanager/secrets/slack_webhook
    #     channel: '#atm-alerts'
    #     title: '{{ .CommonAnnotations.summary }}'
    #     text: '{{ .CommonAnnotations.description }}'
    #     send_resolved: true
    webhook_configs:
      - url: http://127.0.0.1:5001/page
        send_resolved: true

inhibit_rules:
  # When the backend is down (up=0), conservation can't be evaluated — suppress
  # the conservation alerts so the page says "backend down", not "ledger broke".
  - source_matchers:
      - alertname = "BackendDown"
    target_matchers:
      - alertname =~ "Conservation.*"
    equal: ['service']
