# Production overlay for a single AWS EC2 box (Amazon Linux 2023).
#
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
#
# Builds on the base docker-compose.yml (postgres + backend + seed + mcp-http)
# and changes ONLY what differs in production:
#   - Caddy reverse proxy terminates public TLS for both subdomains.
#   - Backend/MCP ports are NOT published to the host — Caddy reaches them over
#     the compose network. Only Caddy binds 80/443.
#   - SANDBOX_ALLOW_LOCAL is removed (it's a demo-only escape hatch; see below).
#   - Postgres password comes from the environment, never hard-coded.
#
# See docs/deploy.md for the full operator runbook.

services:
  postgres:
    # Password is injected from the host env / .env file, not the demo default.
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
    # Don't expose the DB to the public internet — only the compose network.
    ports: !reset []

  backend:
    environment:
      PORT: 3000
      NODE_ENV: production
      DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD}@postgres:5432/agent_task_market
      # Browser UI on the custom domain must be allowed to call the API.
      CORS_ORIGINS: ${CORS_ORIGINS:-https://clawmint.space}
      # SANDBOX: docker-mode runs each untrusted submission in a throwaway
      # container (no network, dropped caps, ro rootfs, mem/cpu/pids limits).
      # Required before accepting untrusted submissions. Opt in via .env:
      # SANDBOX_MODE=docker. The socket mount + shared work dir below make it work.
      SANDBOX_MODE: ${SANDBOX_MODE:-}
      SANDBOX_IMAGE: ${SANDBOX_IMAGE:-node:20-bookworm-slim}
      # Shared work dir: the backend (in this container) spawns the sandbox on
      # the HOST daemon via the mounted socket, so the per-submission dir must
      # exist at the SAME path on host and here. Bind-mounted below as /srv/verify.
      VERIFY_TMP: ${VERIFY_TMP:-/srv/verify}
      # Re-arm the production RCE guard (sandbox.ts): base compose sets
      # SANDBOX_ALLOW_LOCAL=1 for the trusted demo, and Compose MERGES env maps
      # across -f files — omitting the key here would NOT remove the inherited
      # value, silently disabling the guard. `!reset null` actually drops it, so
      # the guard (verificationService → getSandboxRunner) throws on the first
      # submission verification unless SANDBOX_MODE=docker (or the operator
      # re-adds ALLOW_LOCAL deliberately in .env).
      SANDBOX_ALLOW_LOCAL: !reset null
      # Closed-source risk-engine (CLAWMIN-10). OFF until the operator sets
      # RISK_ENGINE_URL in .env — until then getRiskEngine() falls back to the
      # permissive NoopRiskEngine, so deploying this overlay is a no-op for risk
      # behavior (safe default). When set, register/claim/publish/finalize consult
      # the `risk-engine` service below.
      # SAFETY: with the URL set, an UNREACHABLE engine makes finalize fail-closed
      # (payout held for review — recoverable), while register/claim/publish
      # fail-open. RISK_ENGINE_KEY must equal the engine's RISK_ENGINE_TOKEN.
      RISK_ENGINE_URL: ${RISK_ENGINE_URL:-}
      RISK_ENGINE_KEY: ${RISK_ENGINE_KEY:-}
      RISK_ENGINE_TIMEOUT_MS: ${RISK_ENGINE_TIMEOUT_MS:-2000}
      # Admin/ops API token (risk-flag review release/confirm, reconcile). Compose
      # only injects variables it NAMES here — a value in .env alone never reaches
      # the container — so without this line every /admin route 404s (admin.ts
      # treats an unset token as "disabled"). Empty default keeps the demo's
      # admin routes disabled until the operator sets ADMIN_TOKEN in .env.
      ADMIN_TOKEN: ${ADMIN_TOKEN:-}
      # /metrics scrape token. Same rule: must be named here to reach the backend.
      # Empty → /metrics is open (backend logs a warning); set it in .env AND in the
      # monitoring overlay's prometheus env so the scrape authenticates with it.
      METRICS_TOKEN: ${METRICS_TOKEN:-}
    # Reset the demo's published port — Caddy fronts it now.
    ports: !reset []
    # Tighter probe than the demo (base is 3s×20=60s to unhealthy). 3s×3 ≈ 9s to
    # unhealthy; autoheal (below) then restarts within its 5s poll → well under
    # the 30s acceptance bar. autoheal label opts this container in.
    healthcheck:
      interval: 3s
      timeout: 3s
      retries: 3
      start_period: 15s
    labels:
      autoheal: "true"
    # docker-mode sandbox wiring:
    #  - docker.sock: lets the backend spawn sibling sandbox containers on the
    #    host daemon. SECURITY: this is host-root-equivalent access — acceptable
    #    for beta (the sandbox still isolates the untrusted code itself), but
    #    gVisor/Firecracker is the long-term boundary. See docs/deploy.md.
    #  - /srv/verify: shared per-submission work dir, same path host↔container,
    #    so the sandbox's `-v <cwd>:/work` (resolved by the host daemon) finds
    #    the files the backend wrote. Must exist on the host: sudo mkdir -p.
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /srv/verify:/srv/verify
    # The image runs as the unprivileged `node` user, but the mounted socket is
    # owned root:docker on the host — so add the host's docker group GID as a
    # supplementary group, or every `docker` call is permission-denied. The GID
    # varies per box; the operator sets DOCKER_GID in .env:
    #   getent group docker | cut -d: -f3
    # Default 999 is an inert/unused group when sandbox mode is off (harmless).
    group_add:
      - "${DOCKER_GID:-999}"

  # Closed-source risk-engine (private image, CLAWMIN-10). Always runs (it's a
  # tiny in-memory service), but the backend only consults it once RISK_ENGINE_URL
  # is set in .env — so this is inert until the operator opts in. Not in the base
  # demo compose: the image is private, so public `docker compose up` never pulls it.
  #
  # Pull requires `docker login ghcr.io` on the box (see docs/deploy.md). Pin a sha
  # via RISK_ENGINE_IMAGE in .env for reproducible deploys; defaults to :latest.
  # No host ports — only the backend reaches it on the compose network.
  risk-engine:
    image: ${RISK_ENGINE_IMAGE:-ghcr.io/clawmint-ai/risk-engine:latest}
    restart: unless-stopped
    environment:
      PORT: 9000
      # Same secret the backend sends as RISK_ENGINE_KEY. If empty, the engine
      # disables auth — so ALWAYS set RISK_ENGINE_KEY in .env before going live.
      RISK_ENGINE_TOKEN: ${RISK_ENGINE_KEY:-}
      # Gradual rollout: start true (pure passthrough), then false + per-heuristic
      # flags. See docs/deploy.md "risk-engine rollout".
      STUB_MODE: ${RISK_ENGINE_STUB_MODE:-true}
      RISK_SYBIL_ENABLED: ${RISK_SYBIL_ENABLED:-false}
      RISK_SELF_DEALING_ENABLED: ${RISK_SELF_DEALING_ENABLED:-false}
      RISK_COLLUSION_ENABLED: ${RISK_COLLUSION_ENABLED:-false}
      RISK_SAMPLING_ENABLED: ${RISK_SAMPLING_ENABLED:-false}
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:9000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 3s
      timeout: 3s
      retries: 3
      start_period: 10s
    labels:
      autoheal: "true"

  mcp-http:
    # Reset the demo's published port — Caddy fronts it.
    ports: !reset []
    # Base compose gives mcp-http no healthcheck; add one so autoheal can watch
    # it too. The MCP HTTP server serves /health (src/index.ts).
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:8080/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 3s
      timeout: 3s
      retries: 3
      start_period: 15s
    labels:
      autoheal: "true"

  # Restarts any container marked unhealthy (Docker's restart policy only fires
  # on crash/exit, not on unhealthy). Polls every 5s; only touches containers
  # labelled autoheal=true above.
  autoheal:
    image: willfarrell/autoheal:latest
    restart: unless-stopped
    environment:
      AUTOHEAL_CONTAINER_LABEL: autoheal
      AUTOHEAL_INTERVAL: 5
      AUTOHEAL_START_PERIOD: 15
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      backend:
        condition: service_healthy
      mcp-http:
        condition: service_started

volumes:
  caddy_data:
  caddy_config:
