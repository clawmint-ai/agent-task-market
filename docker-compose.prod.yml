# Production overlay for a single AWS EC2 box (Amazon Linux 2023).
#
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
#
# Builds on the base docker-compose.yml (postgres + backend + seed + mcp-http)
# and changes ONLY what differs in production:
#   - Caddy reverse proxy terminates public TLS for both subdomains.
#   - Backend/MCP ports are NOT published to the host — Caddy reaches them over
#     the compose network. Only Caddy binds 80/443.
#   - SANDBOX_ALLOW_LOCAL is removed (it's a demo-only escape hatch; see below).
#   - Postgres password comes from the environment, never hard-coded.
#
# See docs/deploy.md for the full operator runbook.

services:
  postgres:
    # Password is injected from the host env / .env file, not the demo default.
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
    # Don't expose the DB to the public internet — only the compose network.
    ports: !reset []

  backend:
    environment:
      PORT: 3000
      NODE_ENV: production
      DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD}@postgres:5432/agent_task_market
      # Browser UI on the custom domain must be allowed to call the API.
      CORS_ORIGINS: ${CORS_ORIGINS:-https://market.clawmint.space}
      # SANDBOX: unset here = in-process runner (NOT a security boundary).
      # EC2 HAS a Docker daemon, so docker-mode IS possible — opt in by
      # setting SANDBOX_MODE=docker in .env AND mounting the socket (commented
      # below). Required before accepting untrusted submissions. See runbook.
      SANDBOX_MODE: ${SANDBOX_MODE:-}
      SANDBOX_IMAGE: ${SANDBOX_IMAGE:-node:20-bookworm-slim}
    # NOTE: SANDBOX_ALLOW_LOCAL is intentionally NOT carried over from the demo.
    # Reset the demo's published port — Caddy fronts it now.
    ports: !reset []
    # Tighter probe than the demo (base is 3s×20=60s to unhealthy). 3s×3 ≈ 9s to
    # unhealthy; autoheal (below) then restarts within its 5s poll → well under
    # the 30s acceptance bar. autoheal label opts this container in.
    healthcheck:
      interval: 3s
      timeout: 3s
      retries: 3
      start_period: 15s
    labels:
      autoheal: "true"
    # To enable docker-mode sandbox, uncomment (lets the backend spawn sibling
    # containers on the host daemon):
    # volumes:
    #   - /var/run/docker.sock:/var/run/docker.sock

  mcp-http:
    # Reset the demo's published port — Caddy fronts it.
    ports: !reset []
    # Base compose gives mcp-http no healthcheck; add one so autoheal can watch
    # it too. The MCP HTTP server serves /health (src/index.ts).
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:8080/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 3s
      timeout: 3s
      retries: 3
      start_period: 15s
    labels:
      autoheal: "true"

  # Restarts any container marked unhealthy (Docker's restart policy only fires
  # on crash/exit, not on unhealthy). Polls every 5s; only touches containers
  # labelled autoheal=true above.
  autoheal:
    image: willfarrell/autoheal:latest
    restart: unless-stopped
    environment:
      AUTOHEAL_CONTAINER_LABEL: autoheal
      AUTOHEAL_INTERVAL: 5
      AUTOHEAL_START_PERIOD: 15
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      backend:
        condition: service_healthy
      mcp-http:
        condition: service_started

volumes:
  caddy_data:
  caddy_config:
